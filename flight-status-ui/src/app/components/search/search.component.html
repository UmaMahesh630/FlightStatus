<div class="search-container">
  <div class="search-box">
    <div class="logo-area">
      <span class="logo-icon">✈</span>
      <h1 class="app-title">SkyRoute Status</h1>
      <p class="app-subtitle">Real-time normalized flight status lookup</p>
    </div>

    <!-- Search Form (Reactive Form) -->
    <form [formGroup]="searchForm" (ngSubmit)="onSubmit()" class="search-form">
      <!-- Flight Number input group -->
      <div class="input-group">
        <label for="flightNumber">Flight Number</label>
        <div class="input-wrapper" [ngClass]="{'has-error': searchForm.get('flightNumber')?.touched && searchForm.get('flightNumber')?.invalid}">
          <span class="input-icon">#</span>
          <input
            type="text"
            id="flightNumber"
            formControlName="flightNumber"
            placeholder="e.g. AI101, BA202"
            autocomplete="off"
          />
        </div>
        <div class="validation-error animate-fade-in" *ngIf="searchForm.get('flightNumber')?.touched && searchForm.get('flightNumber')?.invalid">
          <span *ngIf="searchForm.get('flightNumber')?.errors?.['required']">Flight number is required.</span>
          <span *ngIf="searchForm.get('flightNumber')?.errors?.['pattern']">Flight number must be alphanumeric and between 3 and 10 characters.</span>
        </div>
      </div>

      <!-- Date input group -->
      <div class="input-group">
        <label for="date">Departure Date</label>
        <div class="input-wrapper" [ngClass]="{'has-error': searchForm.get('date')?.touched && searchForm.get('date')?.invalid}">
          <span class="input-icon">📅</span>
          <input
            type="date"
            id="date"
            formControlName="date"
          />
        </div>
        <div class="validation-error animate-fade-in" *ngIf="searchForm.get('date')?.touched && searchForm.get('date')?.invalid">
          <span *ngIf="searchForm.get('date')?.errors?.['required']">Departure date is required.</span>
        </div>
      </div>

      <!-- Action Button -->
      <button type="submit" class="btn-submit" [disabled]="loading()">
        <span *ngIf="!loading()">Search Flights</span>
        <span *ngIf="loading()" class="spinner-container">
          <span class="spinner"></span>
          Searching...
        </span>
      </button>
    </form>

    <!-- Error Display -->
    <div class="error-banner animate-fade-in" *ngIf="error()">
      <span class="error-icon">✕</span>
      <div class="error-content">
        <div class="error-title">Lookup Failed</div>
        <div class="error-message">{{ error() }}</div>
      </div>
    </div>

    <!-- Results Display -->
    <div class="results-wrapper animate-fade-in" *ngIf="result()">
      <app-result [result]="result()!"></app-result>
    </div>
  </div>
</div>
